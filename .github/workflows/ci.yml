name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: gofmt
        run: test -z "$(gofmt -l .)"

      - name: vet
        run: go vet ./...

      - name: unit tests
        run: go test ./...

      - name: integration tests
        run: go test -tags=integration ./test/integration/...

      - name: build
        run: go build -o dist/guard-bash ./cmd/guard-bash
