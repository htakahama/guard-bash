[policy]
allowed = [
  # shell builtin / wrapper
  "cd", "[", "test", ":", "true", "false",
  "env", "command", "nice", "nohup",
  # vcs
  "git", "gh",
  # lang / build
  "cargo", "go", "node", "npm", "npx", "pnpm", "yarn", "bun", "deno",
  "python", "python3", "pip", "pip3", "uv", "uvx", "ruff", "mypy", "pyright", "pytest",
  "ruby", "gem", "bundle", "rake",
  # infra / ops
  "docker", "docker-compose", "podman", "kubectl", "helm", "terraform",
  "gcloud", "firebase", "gsutil", "bq",
  "aws", "sam", "cdk",
  "az", "func", "azd",
  # shell utilities
  "pwd", "cat", "tac", "head", "tail", "less", "more", "nl", "grep", "rg", "find", "ls", "tree", "wc", "diff", "cmp",
  "sort", "uniq", "comm", "join", "paste", "split", "column", "fold", "rev",
  "sed", "awk", "cut", "tr", "tee", "xargs", "expr", "seq", "yes",
  "echo", "printf", "printenv", "date", "whoami", "hostname", "id", "which", "type",
  "mkdir", "cp", "mv", "ln", "rm", "rmdir", "touch", "chmod", "chown",
  "tar", "gzip", "gunzip", "zip", "unzip", "xz", "bzip2", "curl", "wget",
  "jq", "yq",
  "basename", "dirname", "realpath", "readlink", "wslpath", "file", "stat", "du", "df", "uname",
  "base64", "md5sum", "sha1sum", "sha256sum", "sha512sum", "cksum",
  "od", "xxd", "hexdump",
  "sleep", "timeout", "time", "watch", "ps", "pgrep",
  # tools
  "mise", "task", "make", "cmake", "shellcheck", "shfmt",
  "rtk",
  "guard-bash",
]

denied = [
  # 破壊的ディスク操作
  "dd", "mkfs", "fdisk", "parted", "mount", "umount",
  # システム制御
  "reboot", "shutdown", "poweroff", "halt", "init", "systemctl",
  # 危険なネットワーク操作
  "iptables", "ip6tables", "nft", "tc",
  # カーネル / モジュール
  "insmod", "rmmod", "modprobe", "sysctl",
  # ユーザー / 権限昇格
  "sudo", "su", "passwd", "useradd", "userdel", "usermod", "chroot",
  # 動的実行 / evaluation
  "eval", "exec", "source", ".",
]

extra_allowed = []
extra_denied  = []

[checkcd]
allowed_dirs = []

[argcheck]
disabled = []

[logging]
level = "info"
file  = ""
