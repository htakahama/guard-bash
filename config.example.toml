# guard-bash ユーザー設定の例。
# ~/.config/guard-bash/config.toml に配置するか、GUARD_CONFIG 環境変数で
# 明示的にパスを指定する。
#
# 各キーの意味は docs/config.md を参照。

[policy]
# embedded default に追加したいコマンド
extra_allowed = [
  # "my-internal-cli",
]

# embedded default に追加で禁止したいコマンド
extra_denied = [
  # "curl",
]

[checkcd]
# cwd 以外に cd が許可される dir (サブディレクトリも含む)
allowed_dirs = [
  # "/home/user/work",
]

[argcheck]
# 無効にしたい引数チェックルールの ID リスト。
# 利用可能なルール:
#   rm-recursive-broad, git-push-force, git-reset-hard,
#   chmod-recursive-broad, chown-recursive-broad, pipe-to-shell,
#   git-dir-escape, make-dir-escape
disabled = [
  # "git-reset-hard",
]

[logging]
# "debug" | "info" | "warn" | "error"
level = "info"
# 空なら ${XDG_STATE_HOME:-$HOME/.local/state}/guard-bash/guard-bash.log
file = ""
