version: 2

project_name: guard-bash

before:
  hooks:
    - go mod tidy

builds:
  - id: guard-bash
    main: ./cmd/guard-bash
    binary: guard-bash
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- if eq .Os "darwin" }}darwin
      {{- else if eq .Os "linux" }}linux
      {{- else }}{{ .Os }}{{ end }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    include:
      - "^feat"
      - "^fix"
      - "^refactor"
      - "^perf"
  groups:
    - title: "Features"
      regexp: "^feat"
      order: 0
    - title: "Bug fixes"
      regexp: "^fix"
      order: 1
    - title: "Refactoring"
      regexp: "^refactor"
      order: 2
    - title: "Performance"
      regexp: "^perf"
      order: 3

release:
  github:
    owner: htakahama
    name: guard-bash
  draft: false
  prerelease: auto
